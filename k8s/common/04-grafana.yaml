---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
      name: http
  selector:
    app: grafana
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector: # REQUIRED - missing in your file
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: dashboards
              mountPath: /etc/grafana/provisioning/dashboards
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
      volumes:
        - name: dashboards
          configMap:
            name: grafana-dashboards
        - name: datasources
          configMap:
            name: grafana-datasources
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
    - name: 'default'
      orgId: 1
      folder: ''
      type: file
      disableDeletion: false
      updateIntervalSeconds: 10
      allowUiUpdates: true
      options:
        path: /etc/grafana/provisioning/dashboards
---
# Grafana IngressRoute - subdomain-based routing
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`grafana.montech.tail21c10a.ts.net`)
      kind: Rule
      services:
        - name: grafana
          port: 3000
  tls:
    {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-content
  namespace: monitoring
data:
  k8s-cluster.json: |
    {
      "title": "Moshi Inference - Container Metrics",
      "uid": "k8s-cluster",
      "version": 2,
      "refresh": "5s",
      "timezone": "browser",
      "time": { "from": "now-15m", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "CPU Usage (cores)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "rate(container_cpu_usage_seconds_total{namespace=\"moshi-demo\", pod=~\"moshi-.*\"}[5m])",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "cores",
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 2 },
                  { "color": "red", "value": 4 }
                ]
              }
            }
          }
        },
        {
          "id": 2,
          "title": "Memory Usage (bytes)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "container_memory_usage_bytes{namespace=\"moshi-demo\", pod=~\"moshi-.*\"}",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 536870912 },
                  { "color": "red", "value": 1073741824 }
                ]
              }
            }
          }
        },
        {
          "id": 3,
          "title": "Running Pods",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "count(container_last_seen{namespace=\"moshi-demo\", pod=~\"moshi-.*\"})",
              "legendFormat": "Pods",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "GPU Node",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 8 },
          "targets": [
            {
              "expr": "count(node_cpu_info{nixos_nvidia_cdi=\"enabled\"})",
              "legendFormat": "montech",
              "refId": "A"
            }
          ]
        }
      ]
    }
