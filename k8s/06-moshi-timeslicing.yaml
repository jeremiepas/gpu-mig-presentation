# Demo 1: Time Slicing Mode
# All pods share the same GPU with time-slicing
apiVersion: v1
kind: ConfigMap
metadata:
  name: timeslicing-test
  namespace: moshi-demo
data:
  test-gpu-share.sh: |
    #!/bin/bash
    # Simulate GPU workload for time-slicing demo
    nvidia-smi --query-gpu=index,name,memory.used,memory.total,utilization.gpu --format=csv
    echo "---"
    echo "Running time-slicing demo pod: $(hostname)"
    sleep infinity
---
apiVersion: v1
kind: Pod
metadata:
  name: moshi-timeslice-1
  namespace: moshi-demo
  labels:
    demo: timeslicing
    app: moshi
spec:
  restartPolicy: Always
  containers:
    - name: moshi
      image: nvcr.io/nvidia/cuda:12.2.0-runtime-ubuntu22.04
      command: ["/bin/sh", "/scripts/test-gpu-share.sh"]
      env:
        - name: NVIDIA_VISIBLE_DEVICES
          value: "all"
      volumeMounts:
        - name: scripts
          mountPath: /scripts
      resources:
        limits:
          nvidia.com/gpu: "1"
  volumes:
    - name: scripts
      configMap:
        name: timeslicing-test
        defaultMode: 0755
---
