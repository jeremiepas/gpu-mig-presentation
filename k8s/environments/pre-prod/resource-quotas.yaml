---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: moshi-demo-quota
  namespace: moshi-demo
  labels:
    environment: pre-prod
spec:
  hard:
    requests.cpu: "16"
    requests.memory: 64Gi
    requests.nvidia.com/gpu: "4"
    limits.cpu: "32"
    limits.memory: 128Gi
    limits.nvidia.com/gpu: "4"
    persistentvolumeclaims: "5"
    services.loadbalancers: "1"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: monitoring-quota
  namespace: monitoring
  labels:
    environment: pre-prod
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 16Gi
    limits.cpu: "8"
    limits.memory: 32Gi
    persistentvolumeclaims: "3"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: moshi-demo-limits
  namespace: moshi-demo
  labels:
    environment: pre-prod
spec:
  limits:
  - max:
      cpu: "8"
      memory: 32Gi
      nvidia.com/gpu: "1"
    min:
      cpu: "100m"
      memory: 128Mi
    default:
      cpu: "1"
      memory: 2Gi
    defaultRequest:
      cpu: "250m"
      memory: 512Mi
    type: Container
  - max:
      cpu: "16"
      memory: 64Gi
    min:
      cpu: "100m"
      memory: 128Mi
    type: Pod
---
apiVersion: v1
kind: LimitRange
metadata:
  name: monitoring-limits
  namespace: monitoring
  labels:
    environment: pre-prod
spec:
  limits:
  - max:
      cpu: "4"
      memory: 16Gi
    min:
      cpu: "50m"
      memory: 64Mi
    default:
      cpu: "500m"
      memory: 1Gi
    defaultRequest:
      cpu: "100m"
      memory: 256Mi
    type: Container
