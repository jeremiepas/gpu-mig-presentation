---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: moshi-demo-quota
  namespace: moshi-demo
  labels:
    environment: prod
spec:
  hard:
    requests.cpu: "32"
    requests.memory: 128Gi
    requests.nvidia.com/gpu: "7"
    limits.cpu: "64"
    limits.memory: 256Gi
    limits.nvidia.com/gpu: "7"
    persistentvolumeclaims: "10"
    services.loadbalancers: "2"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: monitoring-quota
  namespace: monitoring
  labels:
    environment: prod
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 32Gi
    limits.cpu: "16"
    limits.memory: 64Gi
    persistentvolumeclaims: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: moshi-demo-limits
  namespace: moshi-demo
  labels:
    environment: prod
spec:
  limits:
  - max:
      cpu: "16"
      memory: 64Gi
      nvidia.com/gpu: "1"
    min:
      cpu: "100m"
      memory: 128Mi
    default:
      cpu: "2"
      memory: 4Gi
    defaultRequest:
      cpu: "500m"
      memory: 1Gi
    type: Container
  - max:
      cpu: "32"
      memory: 128Gi
    min:
      cpu: "100m"
      memory: 128Mi
    type: Pod
---
apiVersion: v1
kind: LimitRange
metadata:
  name: monitoring-limits
  namespace: monitoring
  labels:
    environment: prod
spec:
  limits:
  - max:
      cpu: "8"
      memory: 32Gi
    min:
      cpu: "50m"
      memory: 64Mi
    default:
      cpu: "1"
      memory: 2Gi
    defaultRequest:
      cpu: "250m"
      memory: 512Mi
    type: Container
