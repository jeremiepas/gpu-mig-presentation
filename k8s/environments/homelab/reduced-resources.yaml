---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: moshi-demo-quota
  namespace: moshi-demo
  labels:
    environment: homelab
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 32Gi
    requests.nvidia.com/gpu: "2"
    limits.cpu: "16"
    limits.memory: 64Gi
    limits.nvidia.com/gpu: "2"
    persistentvolumeclaims: "3"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: monitoring-quota
  namespace: monitoring
  labels:
    environment: homelab
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 8Gi
    limits.cpu: "4"
    limits.memory: 16Gi
    persistentvolumeclaims: "2"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: moshi-demo-limits
  namespace: moshi-demo
  labels:
    environment: homelab
spec:
  limits:
  - max:
      cpu: "4"
      memory: 16Gi
      nvidia.com/gpu: "1"
    min:
      cpu: "50m"
      memory: 64Mi
    default:
      cpu: "500m"
      memory: 1Gi
    defaultRequest:
      cpu: "100m"
      memory: 256Mi
    type: Container
  - max:
      cpu: "8"
      memory: 32Gi
    min:
      cpu: "50m"
      memory: 64Mi
    type: Pod
---
apiVersion: v1
kind: LimitRange
metadata:
  name: monitoring-limits
  namespace: monitoring
  labels:
    environment: homelab
spec:
  limits:
  - max:
      cpu: "2"
      memory: 8Gi
    min:
      cpu: "25m"
      memory: 32Mi
    default:
      cpu: "250m"
      memory: 512Mi
    defaultRequest:
      cpu: "50m"
      memory: 128Mi
    type: Container
