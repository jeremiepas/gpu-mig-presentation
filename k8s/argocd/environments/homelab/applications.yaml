    targetRevision: HEAD
    path: nixos/kube-moshi-webui
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: moshi-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

---
# ============================================================================
# 6. Ingress Configuration (from nixos/k8s/generated)
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-configuration
  namespace: argocd
  labels:
    environment: homelab
    category: networking
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/jeremiepas/gpu-mig-presentation.git
    targetRevision: HEAD
    path: nixos/k8s/generated
    directory:
      recurse: false
      include: 'ingress.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
