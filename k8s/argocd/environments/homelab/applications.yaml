    category: configuration
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/jeremiepas/gpu-mig-presentation.git
    targetRevision: HEAD
    path: k8s/environments/homelab
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

---
# ============================================================================
# 5. Moshi Application (WebUI and Workloads)
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: moshi-application
  namespace: argocd
  labels:
    environment: homelab
