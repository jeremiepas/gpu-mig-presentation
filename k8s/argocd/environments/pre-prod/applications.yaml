apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: common-infrastructure
  namespace: argocd
  labels:
    environment: pre-prod
    app.kubernetes.io/part-of: argocd
spec:
  project: gpu-demo
  source:
    repoURL: https://github.com/jeremie-lesage/gentle-circuit.git
    targetRevision: HEAD
    path: k8s/common
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pre-prod-specific
  namespace: argocd
  labels:
    environment: pre-prod
    app.kubernetes.io/part-of: argocd
spec:
  project: gpu-demo
  source:
    repoURL: https://github.com/jeremie-lesage/gentle-circuit.git
    targetRevision: HEAD
    path: k8s/environments/pre-prod
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
