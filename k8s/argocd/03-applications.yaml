---
# Application: Namespaces and Runtime Class
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: namespaces-and-runtimeclass
  namespace: argocd
  labels:
    app.kubernetes.io/name: namespaces-and-runtimeclass
    app.kubernetes.io/part-of: argocd
    app.kubernetes.io/managed-by: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/jeremie-lesage/gentle-circuit.git
    targetRevision: HEAD
    path: k8s
    directory:
      recurse: false
      jsonnet: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
---
