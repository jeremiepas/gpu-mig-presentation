---
# ConfigMap to disable TLS on ArgoCD server
# This is needed when accessing ArgoCD through an ingress that terminates TLS
# or when using HTTP-only access in homelab environments
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmd-params-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cmd-params-cm
    app.kubernetes.io/part-of: argocd
data:
  # Run server without TLS
  server.insecure: "true"
