---
# ArgoCD Application Controller - Main controller component
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: argocd-application-controller
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-application-controller
    app.kubernetes.io/part-of: argocd
spec:
  serviceName: argocd-application-controller
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-application-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-application-controller
        app.kubernetes.io/part-of: argocd
    spec:
      serviceAccountName: argocd-application-controller
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: argocd-application-controller
          image: quay.io/argoproj/argocd:v2.9.3
          command:
            - argocd-application-controller
          args:
            - --status-processors
            - "20"
            - --operation-processors
            - "10"
            - --repo-server-timeout-seconds
            - "60"
            - --repo-server
            - argocd-repo-server:8081
            - --loglevel
            - info
          env:
            - name: ARGOCD_CONTROLLER_REPLICAS
              value: "1"
            - name: ARGOCD_RECONCILIATION_TIMEOUT
              value: 180s
            - name: ARGOCD_HARD_RECONCILIATION_TIMEOUT
              value: 0
            - name: ARGOCD_REPO_SERVER
              value: argocd-repo-server:8081
          ports:
            - containerPort: 8082
              name: controller
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: argocd-application-controller
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-application-controller
    app.kubernetes.io/part-of: argocd
spec:
  ports:
    - port: 8082
      targetPort: 8082
      name: controller
  selector:
    app.kubernetes.io/name: argocd-application-controller
---
# ArgoCD Repo Server - Handles Git operations
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-repo-server
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-repo-server
    app.kubernetes.io/part-of: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-repo-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-repo-server
        app.kubernetes.io/part-of: argocd
    spec:
      serviceAccountName: argocd-repo-server
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: argocd-repo-server
          image: quay.io/argoproj/argocd:v2.9.3
          command:
            - entrypoint.sh
            - argocd-repo-server
            - --redis
            - argocd-redis:6379
            - --loglevel
            - info
          ports:
            - containerPort: 8081
              name: repo-server
            - containerPort: 8084
              name: repo-server-grpc
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: helm-working-dir
              mountPath: /helm-working-dir
            - name: plugins
              mountPath: /plugins
      volumes:
        - name: tmp
          emptyDir: {}
        - name: helm-working-dir
          emptyDir: {}
        - name: plugins
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: argocd-repo-server
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-repo-server
    app.kubernetes.io/part-of: argocd
spec:
  ports:
    - port: 8081
      targetPort: 8081
      name: repo-server
    - port: 8084
      targetPort: 8084
      name: repo-server-grpc
  selector:
    app.kubernetes.io/name: argocd-repo-server
---
# ArgoCD Server - Web UI and API
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-server
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-server
    app.kubernetes.io/part-of: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-server
        app.kubernetes.io/part-of: argocd
    spec:
      serviceAccountName: argocd-server
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: argocd-server
          image: quay.io/argoproj/argocd:v2.9.3
          command:
            - argocd-server
            - --rootpath
            - /argocd
            - --insecure
            - --basehref
            - /argocd
            - --loglevel
            - info
          env:
            - name: ARGOCD_SERVER_INSECURE
              value: "true"
            - name: ARGOCD_SERVER_ROOTPATH
              value: /argocd
            - name: ARGOCD_SERVER_BASEHREF
              value: /argocd
          ports:
            - containerPort: 8080
              name: server
            - containerPort: 8083
              name: server-grpc
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: argocd-server
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-server
    app.kubernetes.io/part-of: argocd
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080
      name: http
    - port: 443
      targetPort: 8080
      nodePort: 30443
      name: https
  selector:
    app.kubernetes.io/name: argocd-server
---
# ArgoCD Dex - SSO authentication (optional component)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-dex-server
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-dex-server
    app.kubernetes.io/part-of: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-dex-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-dex-server
        app.kubernetes.io/part-of: argocd
    spec:
      serviceAccountName: argocd-dex-server
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dex
          image: ghcr.io/dexidp/dex:v2.37.0
          command:
            - /usr/local/bin/dex
            - serve
            - /tmp/dex.yaml
          ports:
            - containerPort: 5556
              name: http
            - containerPort: 5557
              name: grpc
            - containerPort: 5558
              name: telemetry
          resources:
            limits:
              cpu: "100m"
              memory: "128Mi"
            requests:
              cpu: "50m"
              memory: "64Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: argocd-cm
---
apiVersion: v1
kind: Service
metadata:
  name: argocd-dex-server
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-dex-server
    app.kubernetes.io/part-of: argocd
spec:
  ports:
    - port: 5556
      targetPort: 5556
      name: http
    - port: 5557
      targetPort: 5557
      name: grpc
    - port: 5558
      targetPort: 5558
      name: telemetry
  selector:
    app.kubernetes.io/name: argocd-dex-server
---
# ArgoCD Redis - Cache for repository data
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-redis
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-redis
    app.kubernetes.io/part-of: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-redis
        app.kubernetes.io/part-of: argocd
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7-alpine
          args:
            - --save
            - ""
            - --appendonly
            - "no"
          ports:
            - containerPort: 6379
              name: redis
          resources:
            limits:
              cpu: "100m"
              memory: "128Mi"
            requests:
              cpu: "50m"
              memory: "64Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: argocd-redis
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-redis
    app.kubernetes.io/part-of: argocd
spec:
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  selector:
    app.kubernetes.io/name: argocd-redis
---
# ArgoCD ConfigMap - Main configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  # Basic configuration
  url: https://argocd-server.argocd.svc.cluster.local
  # Dex configuration (minimal, can be extended for SSO)
  dex.config: |
    staticClients:
      - id: argo-cd-cli
        name: Argo CD CLI
        public: true
        redirectURIs:
          - http://localhost:8085/auth/callback
    connectors:
      # Add SSO connectors here if needed
  # Resource customizations
  resource.customizations: |
    argoproj.io/Application:
      health.lua: |
        hs = {}
        hs.status = "Progressing"
        hs.message = ""
        if obj.status ~= nil then
          if obj.status.sync ~= nil and obj.status.sync.status ~= nil then
            if obj.status.sync.status == "Synced" then
              hs.status = "Healthy"
            elseif obj.status.sync.status == "OutOfSync" then
              hs.status = "Degraded"
            else
              hs.status = "Progressing"
            end
            hs.message = obj.status.sync.status
          end
          if obj.status.operationState ~= nil and obj.status.operationState.phase ~= nil then
            if obj.status.operationState.phase == "Succeeded" then
              hs.status = "Healthy"
              hs.message = "Operation succeeded"
            elseif obj.status.operationState.phase == "Failed" then
              hs.status = "Degraded"
              hs.message = obj.status.operationState.message
            elseif obj.status.operationState.phase == "Running" then
              hs.status = "Progressing"
              hs.message = "Operation in progress"
            end
          end
        end
        return hs
  # Application controller settings
  application.resourceTrackingMethod: annotation
---
# ArgoCD RBAC ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-rbac-cm
    app.kubernetes.io/part-of: argocd
data:
  # Default policy: allow all authenticated users to perform any action
  # In production, restrict this to specific groups/users
  policy.default: role:readonly
  policy.csv: |
    p, role:readonly, applications, get, *, allow
    p, role:readonly, projects, get, *, allow
    p, role:readonly, clusters, get, *, allow
    p, role:readonly, repositories, get, *, allow
    g, admin, role:admin
    g, system:authenticated, role:readonly
  # Additional scopes for OIDC
  scopes: '[groups]'
