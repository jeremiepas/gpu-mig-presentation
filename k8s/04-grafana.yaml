
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
    - name: 'default'
      orgId: 1
      folder: ''
      type: file
      disableDeletion: false
      updateIntervalSeconds: 10
      allowUiUpdates: true
      options:
        path: /etc/grafana/provisioning/dashboards
        foldersFromFilesStructure: true
  gpu-comparison.json: |
    {
      "title": "GPU MIG vs Time Slicing - Live Comparison",
      "uid": "gpu-comparison",
      "version": 2,
      "refresh": "5s",
      "timezone": "browser",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "title": "GPU Utilization % (Time Slicing vs MIG)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "rate(container_cpu_usage_seconds_total{namespace!=''}[1m]) * 100",
              "legendFormat": "{{pod}}",
              "refId": "A",
              "datasource": "Prometheus"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 70},
                  {"color": "red", "value": 90}
                ]
              }
            }
          }
        },
        {
          "id": 2,
          "title": "Memory Usage MB (Compare Before/After)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [
            {
              "expr": "container_memory_working_set_bytes{namespace!=''} / 1024 / 1024",
              "legendFormat": "{{pod}} Memory Used (MB)",
              "refId": "A",
              "datasource": "Prometheus"
            },
            {
              "expr": "container_memory_working_set_bytes{namespace!=''} / 1024 / 1024",
              "legendFormat": "{{pod}} Memory Total (MB)",
              "refId": "B",
              "datasource": "Prometheus"
            }
          ],
            "fieldConfig": {
              "defaults": {
                "unit": "percent",
                "thresholds": {
                  "steps": [
                    {"value": 0, "color": "green"},
                    {"value": 70, "color": "yellow"},
                    {"value": 90, "color": "red"}
                  ]
                },
                "custom": {"lineWidth": 2}
              }
            }
          },
          {
            "id": 2,
            "title": "Memory Usage",
            "type": "timeseries",
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [
            {
              "expr": "node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes",
              "legendFormat": "Used",
              "refId": "A",
              "datasource": "Prometheus"
            },
            {
              "expr": "node_memory_MemAvailable_bytes",
              "legendFormat": "Available",
              "refId": "B",
              "datasource": "Prometheus"
            }
          ],
            "fieldConfig": {
              "defaults": {
                "unit": "bytes",
                "thresholds": {
                  "steps": [
                    {"value": 0, "color": "green"},
                    {"value": 80, "color": "yellow"},
                    {"value": 95, "color": "red"}
                  ]
                }
              }
            }
          },
          {
            "id": 3,
            "title": "Memory Usage %",
            "type": "gauge",
            "gridPos": {"h": 8, "w": 6, "x": 0, "y": 8},
            "targets": [
              {
                "expr": "(node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100",
                "legendFormat": "Memory %",
                "refId": "A"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "unit": "percent",
                "thresholds": {
                  "steps": [
                    {"value": 0, "color": "green"},
                    {"value": 70, "color": "yellow"},
                    {"value": 90, "color": "red"}
                  ]
                },
                "max": 100,
                "min": 0
              }
            }
          },
          {
            "id": 4,
            "title": "Disk Usage %",
            "type": "gauge",
            "gridPos": {"h": 8, "w": 6, "x": 6, "y": 8},
            "targets": [
              {
                "expr": "(node_filesystem_size_bytes{mountpoint='/'} - node_filesystem_avail_bytes{mountpoint='/'}) / node_filesystem_size_bytes{mountpoint='/'} * 100",
                "legendFormat": "Disk %",
                "refId": "A"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "unit": "percent",
                "thresholds": {
                  "steps": [
                    {"value": 0, "color": "green"},
                    {"value": 70, "color": "yellow"},
                    {"value": 90, "color": "red"}
                  ]
                },
                "max": 100,
                "min": 0
              }
            }
          },
          {
            "id": 5,
            "title": "Network Traffic",
            "type": "timeseries",
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
            "targets": [
              {
                "expr": "rate(node_network_receive_bytes_total{device!='lo'}[5m])",
                "legendFormat": "RX {{device}}",
                "refId": "A"
              },
              {
                "expr": "rate(node_network_transmit_bytes_total{device!='lo'}[5m])",
                "legendFormat": "TX {{device}}",
                "refId": "B"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "unit": "bytes/s"
              }
            }
          },
          {
            "id": 6,
            "title": "GPU Utilization",
            "type": "timeseries",
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
          "targets": [
            {
              "expr": "100 - (avg by (instance) (rate(node_cpu_seconds_total{mode='idle'}[5m])) * 100)",
              "legendFormat": "CPU Usage %",
              "refId": "A",
              "datasource": "Prometheus"
            }
          ],
            "fieldConfig": {
              "defaults": {
                "unit": "percent",
                "thresholds": {
                  "steps": [
                    {"value": 0, "color": "green"},
                    {"value": 50, "color": "yellow"},
                    {"value": 90, "color": "red"}
                  ]
                }
              }
            }
          },
          {
            "id": 7,
            "title": "GPU Memory Usage",
            "type": "timeseries",
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16},
            "targets": [
              {
                "expr": "nvidia_dcgm_exporter_gpu_memory_used_bytes / nvidia_dcgm_exporter_gpu_memory_total_bytes * 100",
                "legendFormat": "GPU {{gpu}}",
                "refId": "A"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "unit": "percent",
                "thresholds": {
                  "steps": [
                    {"value": 0, "color": "green"},
                    {"value": 80, "color": "yellow"},
                    {"value": 95, "color": "red"}
                  ]
                }
              }
            }
          },
          {
            "id": 8,
            "title": "Estimated Cost (DEV1-S)",
            "type": "stat",
            "gridPos": {"h": 4, "w": 6, "x": 0, "y": 24},
            "targets": [
              {
                "expr": "0.0044",
                "legendFormat": "€/hour",
                "refId": "A"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "unit": "currency EUR",
                "thresholds": {
                  "steps": [
                    {"value": 0, "color": "green"}
                  ]
                }
              }
            }
          },
          {
            "id": 9,
            "title": "Estimated Monthly Cost",
            "type": "stat",
            "gridPos": {"h": 4, "w": 6, "x": 6, "y": 24},
            "targets": [
              {
                "expr": "0.0044 * 24 * 30",
                "legendFormat": "€/month",
                "refId": "A"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "unit": "currency EUR",
                "thresholds": {
                  "steps": [
                    {"value": 0, "color": "green"}
                  ]
                }
              }
            }
          },
          {
            "id": 10,
            "title": "Instance Uptime",
            "type": "stat",
            "gridPos": {"h": 4, "w": 6, "x": 12, "y": 24},
            "targets": [
              {
                "expr": "time() - node_time_seconds",
                "legendFormat": "Uptime",
                "refId": "A"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "unit": "s",
                "thresholds": {
                  "steps": [
                    {"value": 0, "color": "green"}
                  ]
                },
                "decimals": 0
              }
            }
          },
          {
            "id": 11,
            "title": "Load Average",
            "type": "timeseries",
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 28},
            "targets": [
              {
                "expr": "node_load1",
                "legendFormat": "1m",
                "refId": "A"
              },
              {
                "expr": "node_load5",
                "legendFormat": "5m",
                "refId": "B"
              },
              {
                "expr": "node_load15",
                "legendFormat": "15m",
                "refId": "C"
              }
            ]
          }
        ],
        "templating": {
          "list": []
        },
        "time": {
          "from": "now-1h",
          "to": "now"
        },
        "timepicker": {}
      }
    }

    application-inventory.json: |
      {
        "title": "Application Inventory - Links and Health Status",
        "uid": "application-inventory",
        "version": 1,
        "refresh": "30s",
        "timezone": "browser",
        "panels": [
          {
            "id": 1,
            "title": "Application Links",
            "type": "text",
            "gridPos": {"h": 10, "w": 24, "x": 0, "y": 0},
            "mode": "markdown",
            "content": "# Application Inventory\n\n## Monitoring Tools\n- **Grafana**: [http://{{instance_ip}}:30300/grafana](http://{{instance_ip}}:30300/grafana)\n- **Prometheus**: [http://{{instance_ip}}:30090](http://{{instance_ip}}:30090)\n- **ArgoCD**: [http://{{instance_ip}}:30080](http://{{instance_ip}}:30080)\n\n## Health Status\n- **GPU Operator**: Check `kubectl get pods -n gpu-operator`\n- **Moshi Demo**: Check `kubectl get pods -n moshi-demo`\n- **Monitoring**: Check `kubectl get pods -n monitoring`\n",
            "options": {
              "content": "# Application Inventory\n\n## Monitoring Tools\n- **Grafana**: [http://{{instance_ip}}:30300/grafana](http://{{instance_ip}}:30300/grafana)\n- **Prometheus**: [http://{{instance_ip}}:30090](http://{{instance_ip}}:30090)\n- **ArgoCD**: [http://{{instance_ip}}:30080](http://{{instance_ip}}:30080)\n\n## Health Status\n- **GPU Operator**: Check `kubectl get pods -n gpu-operator`\n- **Moshi Demo**: Check `kubectl get pods -n moshi-demo`\n- **Monitoring**: Check `kubectl get pods -n monitoring`\n",
              "mode": "markdown"
            }
          },
          {
            "id": 2,
            "title": "Application Health Status",
            "type": "table",
            "gridPos": {"h": 10, "w": 24, "x": 0, "y": 10},
            "targets": [
              {
                "expr": "up{job=~'kubernetes-pods|kubernetes-nodes'}",
                "legendFormat": "{{pod}} - {{namespace}}",
                "refId": "A"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "custom": {
                  "align": "auto",
                  "filterable": true
                },
                "mappings": [
                  {
                    "options": {
                      "1": {
                        "text": "UP"
                      },
                      "0": {
                        "text": "DOWN"
                      }
                    },
                    "type": "value"
                  }
                ],
                "thresholds": {
                  "steps": [
                    {
                      "color": "green",
                      "value": null
                    },
                    {
                      "color": "red",
                      "value": 0
                    }
                  ]
                }
              }
            }
          },
          {
            "id": 3,
            "title": "Cluster Resource Usage",
            "type": "timeseries",
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 20},
            "targets": [
              {
                "expr": "sum(rate(container_cpu_usage_seconds_total{namespace!=''}[5m])) by (namespace)",
                "legendFormat": "{{namespace}} CPU",
                "refId": "A"
              }
            ]
          },
          {
            "id": 4,
            "title": "Memory Usage by Namespace",
            "type": "timeseries",
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 20},
            "targets": [
              {
                "expr": "sum(container_memory_working_set_bytes{namespace!=''}) by (namespace) / 1024 / 1024",
                "legendFormat": "{{namespace}} Memory (MB)",
                "refId": "A"
              }
            ]
          },
          {
            "id": 5,
            "title": "Quick Access Links",
            "type": "text",
            "gridPos": {"h": 4, "w": 24, "x": 0, "y": 28},
            "mode": "markdown",
            "content": "## Quick Access\n\n**Kubernetes Dashboard**: `kubectl get nodes -o wide`\n**GPU Status**: `kubectl get pods -n gpu-operator`\n**Moshi Workloads**: `kubectl get pods -n moshi-demo -o wide`\n**Logs**: `kubectl logs -n monitoring deployment/grafana`\n",
            "options": {
              "content": "## Quick Access\n\n**Kubernetes Dashboard**: `kubectl get nodes -o wide`\n**GPU Status**: `kubectl get pods -n gpu-operator`\n**Moshi Workloads**: `kubectl get pods -n moshi-demo -o wide`\n**Logs**: `kubectl logs -n monitoring deployment/grafana`\n",
              "mode": "markdown"
            }
          }
        ],
        "templating": {
          "list": []
        },
        "time": {
          "from": "now-1h",
          "to": "now"
        },
        "timepicker": {}
      }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: grafana
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: grafana
    namespace: monitoring
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      serviceAccountName: grafana
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_SERVER_ROOT_URL
              value: "http://dda6040a-6b4a-46f1-bafb-d8105f7ebc68.pub.instances.scw.cloud/grafana"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
          volumeMounts:
            - name: grafana-storage
              mountPath: /var/lib/grafana
            - name: grafana-dashboards
              mountPath: /etc/grafana/provisioning/dashboards
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
      volumes:
        - name: grafana-storage
          emptyDir: {}
        - name: grafana-dashboards
          configMap:
            name: grafana-dashboards
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
  selector:
    app: grafana
