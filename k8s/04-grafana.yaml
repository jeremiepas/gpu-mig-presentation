---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
    - name: 'default'
      orgId: 1
      folder: ''
      type: file
      disableDeletion: false
      updateIntervalSeconds: 10
      allowUiUpdates: true
      options:
        path: /etc/grafana/provisioning/dashboards
  k8s-cluster.json: |
    {
      "title": "Moshi Inference - Container Metrics",
      "uid": "k8s-cluster",
      "version": 2,
      "refresh": "5s",
      "timezone": "browser",
      "time": { "from": "now-15m", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "CPU Usage (cores)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "rate(container_cpu_usage_seconds_total{namespace=\"moshi-demo\", pod=~\"moshi-.*\"}[5m])",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "cores",
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 2 },
                  { "color": "red", "value": 4 }
                ]
              }
            }
          }
        },
        {
          "id": 2,
          "title": "Memory Usage (bytes)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "container_memory_usage_bytes{namespace=\"moshi-demo\", pod=~\"moshi-.*\"}",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 536870912 },
                  { "color": "red", "value": 1073741824 }
                ]
              }
            }
          }
        },
        {
          "id": 3,
          "title": "Running Pods",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "count(container_last_seen{namespace=\"moshi-demo\", pod=~\"moshi-.*\"})",
              "legendFormat": "Pods",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "GPU Node",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 8 },
          "targets": [
            {
              "expr": "count(node_cpu_info{nixos_nvidia_cdi=\"enabled\"})",
              "legendFormat": "montech",
              "refId": "A"
            }
          ]
        }
      ]
    }
