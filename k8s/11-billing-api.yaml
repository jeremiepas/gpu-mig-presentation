apiVersion: v1
kind: ConfigMap
metadata:
  name: billing-api
  namespace: monitoring
data:
  billing-api.py: |
    #!/usr/bin/env python3
    """
    Scaleway Billing API
    Fetches billing consumption data and serves JSON for Grafana
    """
    
    import os
    import json
    import subprocess
    from datetime import datetime
    from http.server import HTTPServer, BaseHTTPRequestHandler
    from urllib.parse import urlparse
    
    SCW_SECRET_KEY = os.environ.get('SCW_SECRET_KEY', '')
    SCW_ACCESS_KEY = os.environ.get('SCW_ACCESS_KEY', '')
    PROJECT_ID = os.environ.get('SCW_PROJECT_ID', 'bbaff92f-ddd8-493b-8d03-05de850deb29')
    
    INSTANCE_PRICES = {
        'DEV1-S': 0.0044,
        'DEV1-M': 0.0089,
        'DEV1-L': 0.0178,
        'DEV1-XL': 0.0355,
        'H100-1-80G': 5.50,
        'L4-1-24G': 0.85,
        'L4-2-48G': 1.70,
    }
    
    
    def run_scw_command():
        """Run scw billing consumption list and return JSON"""
        env = os.environ.copy()
        env['SCW_SECRET_KEY'] = SCW_SECRET_KEY
        env['SCW_ACCESS_KEY'] = SCW_ACCESS_KEY
        
        try:
            result = subprocess.run(
                ['scw', 'billing', 'consumption', 'list', '-o', 'json'],
                env=env,
                capture_output=True,
                text=True,
                timeout=30
            )
            if result.returncode != 0:
                return {'error': result.stderr, 'data': []}
            
            data = json.loads(result.stdout)
            return {'data': data, 'error': None}
        except Exception as e:
            return {'error': str(e), 'data': []}
    
    
    def calculate_cost(units, nanos, currency='EUR'):
        """Calculate cost from units and nanos"""
        total = units + (nanos / 1_000_000_000)
        return round(total, 2)
    
    
    def get_total_cost(data):
        """Calculate total cost from all consumption"""
        total = 0
        for item in data:
            value = item.get('value', {})
            total += calculate_cost(value.get('units', 0), value.get('nanos', 0))
        return round(total, 4)
    
    
    def get_cost_by_category(data):
        """Group costs by category"""
        categories = {}
        for item in data:
            cat = item.get('category_name', 'Unknown')
            value = item.get('value', {})
            cost = calculate_cost(value.get('units', 0), value.get('nanos', 0))
            categories[cat] = categories.get(cat, 0) + cost
        return categories
    
    
    def get_cost_by_product(data):
        """Group costs by product"""
        products = {}
        for item in data:
            prod = item.get('product_name', 'Unknown')
            value = item.get('value', {})
            cost = calculate_cost(value.get('units', 0), value.get('nanos', 0))
            products[prod] = products.get(prod, 0) + cost
        return products
    
    
    class BillingHandler(BaseHTTPRequestHandler):
        """HTTP handler for billing API"""
        
        def log_message(self, format, *args):
            pass
        
        def send_json(self, data, status=200):
            self.send_response(status)
            self.send_header('Content-Type', 'application/json')
            self.end_headers()
            self.wfile.write(json.dumps(data).encode())
        
        def do_GET(self):
            parsed = urlparse(self.path)
            path = parsed.path
            
            if path == '/health':
                self.send_json({'status': 'ok', 'timestamp': datetime.now().isoformat()})
                return
            
            if path == '/metrics':
                result = run_scw_command()
                if result['error']:
                    self.send_json({'error': result['error']}, 500)
                    return
                
                data = result['data']
                metrics = []
                total = get_total_cost(data)
                metrics.append(f'scaleway_total_cost_eur {total}')
                
                for cat, cost in get_cost_by_category(data).items():
                    metrics.append(f'scaleway_cost_category{{category="{cat}"}} {cost}')
                
                for prod, cost in get_cost_by_product(data).items():
                    prod_safe = prod.replace(' ', '_').replace('-', '_')
                    metrics.append(f'scaleway_cost_product{{product="{prod_safe}"}} {cost}')
                
                self.send_response(200)
                self.send_header('Content-Type', 'text/plain')
                self.end_headers()
                self.wfile.write('\n'.join(metrics).encode())
                return
            
            result = run_scw_command()
            
            if result['error']:
                self.send_json({'error': result['error'], 'timestamp': datetime.now().isoformat()}, 500)
                return
            
            data = result['data']
            
            response = {
                'timestamp': datetime.now().isoformat(),
                'total_cost_eur': get_total_cost(data),
                'by_category': get_cost_by_category(data),
                'by_product': get_cost_by_product(data),
            }
            
            self.send_json(response)
    
    
    def main():
        port = int(os.environ.get('PORT', 8080))
        server = HTTPServer(('0.0.0.0', port), BillingHandler)
        print(f'Starting billing API on port {port}')
        server.serve_forever()
    
    
    if __name__ == '__main__':
        main()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-api
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: billing-api
  template:
    metadata:
      labels:
        app: billing-api
    spec:
      containers:
      - name: billing-api
        image: python:3.11-slim
        command: ["python3", "/etc/billing/billing-api.py"]
        ports:
        - containerPort: 8080
        env:
        - name: SCW_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: scaleway-credentials
              key: access-key
        - name: SCW_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: scaleway-credentials
              key: secret-key
        - name: SCW_PROJECT_ID
          value: "bbaff92f-ddd8-493b-8d03-05de850deb29"
        volumeMounts:
        - name: billing-script
          mountPath: /etc/billing
      volumes:
      - name: billing-script
        configMap:
          name: billing-api
          defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: billing-api
  namespace: monitoring
spec:
  selector:
    app: billing-api
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: v1
kind: Secret
metadata:
  name: scaleway-credentials
  namespace: monitoring
type: Opaque
stringData:
  access-key: ""
  secret-key: ""
