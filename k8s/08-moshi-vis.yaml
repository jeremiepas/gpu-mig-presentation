apiVersion: v1
kind: Namespace
metadata:
  name: moshi-vis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: moshi-vis
  namespace: moshi-vis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: moshi-vis
  template:
    metadata:
      labels:
        app: moshi-vis
    spec:
      containers:
      - name: moshi-vis
        image: kyutai/moshika-vis-pytorch-bf16:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
            nvidia.com/gpu: "1"
          limits:
            memory: "8Gi"
            cpu: "4"
            nvidia.com/gpu: "1"
        env:
        - name: MODEL_NAME
          value: "moshika-vis-pytorch-bf16"
---
apiVersion: v1
kind: Service
metadata:
  name: moshi-vis-service
  namespace: moshi-vis
spec:
  selector:
    app: moshi-vis
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: moshi-vis-ingress
  namespace: moshi-vis
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - http:
      paths:
      - path: /moshi-vis
        pathType: Prefix
        backend:
          service:
            name: moshi-vis-service
            port:
              number: 80