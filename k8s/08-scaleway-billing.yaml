apiVersion: v1
kind: Service
metadata:
  name: scaleway-billing-exporter
  namespace: monitoring
  labels:
    app: scaleway-billing
spec:
  ports:
    - port: 9091
      targetPort: 9091
      name: metrics
  selector:
    app: scaleway-billing
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scaleway-billing-exporter
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scaleway-billing
  template:
    metadata:
      labels:
        app: scaleway-billing
    spec:
      containers:
        - name: exporter
          image: python:3.11-slim
          ports:
            - containerPort: 9091
          env:
            - name: SCW_PROJECT_ID
              value: "bbaff92f-ddd8-493b-8d03-05de850deb29"
            - name: SCW_SECRET_KEY
              value: "49acc19f-3899-4884-b16b-79c42058242c"
            - name: PORT
              value: "9091"
          command:
            - python3
            - -c
            - |
              import os
              import json
              from http.server import HTTPServer, BaseHTTPRequestHandler
              import urllib.request
              import urllib.parse

              SCW_PROJECT_ID = os.environ.get("SCW_PROJECT_ID", "")
              SCW_SECRET_KEY = os.environ.get("SCW_SECRET_KEY", "")

              def get_billing_data():
                  base_url = "https://api.scaleway.com/billing/v2beta1/consumptions"
                  params = urllib.parse.urlencode({"project_id": SCW_PROJECT_ID, "page": 1})
                  url = f"{base_url}?{params}"
                  req = urllib.request.Request(url)
                  req.add_header("X-Auth-Token", SCW_SECRET_KEY)
                  try:
                      with urllib.request.urlopen(req, timeout=30) as response:
                          return json.loads(response.read())
                  except Exception as e:
                      return {"consumptions": []}

              def generate_metrics():
                  data = get_billing_data()
                  consumptions = data.get("consumptions", [])
                  total_cost = 0
                  l4_cost = 0
                  l4_minutes = 0
                  instance_type = "unknown"
                  for item in consumptions:
                      value = item.get("value", {})
                      cost = value.get("units", 0) + (value.get("nanos", 0) / 1_000_000_000)
                      total_cost += cost
                      if "L4" in item.get("product_name", ""):
                          l4_cost = cost
                          l4_minutes = int(item.get("billed_quantity", 0))
                          # Extract instance type from resource_name (e.g., "L4-1-24G fr-par-2" -> "L4-1-24G")
                          resource_name = item.get("resource_name", "")
                          if "FR-PAR" in resource_name:
                              instance_type = resource_name.split(" FR-PAR")[0]

                  metrics = []
                  metrics.append(f"scaleway_monthly_cost_total {total_cost:.4f}")
                  if l4_minutes > 0:
                      hourly_cost = (l4_cost / l4_minutes) * 60
                  else:
                      hourly_cost = 0.76
                  metrics.append(f"scaleway_l4_hourly_cost {hourly_cost:.4f}")
                  metrics.append(f"scaleway_l4_minutes_used {l4_minutes}")
                  metrics.append(f"scaleway_daily_cost_projection {hourly_cost * 24:.2f}")
                  metrics.append(f"scaleway_monthly_cost_projection {hourly_cost * 24 * 30:.2f}")
                  metrics.append(f'scaleway_instance_type{{type="{instance_type}"}} 1')
                  return "\n".join(metrics)

              class Handler(BaseHTTPRequestHandler):
                  def do_GET(self):
                      if self.path == "/metrics":
                          self.send_response(200)
                          self.send_header("Content-Type", "text/plain")
                          self.end_headers()
                          self.wfile.write(generate_metrics().encode())
                      elif self.path == "/health":
                          self.send_response(200)
                          self.send_header("Content-Type", "application/json")
                          self.end_headers()
                          self.wfile.write(b'{"status":"ok"}')
                      else:
                          self.send_response(404)
                          self.end_headers()

              HTTPServer(("0.0.0.0", 9091), Handler).serve_forever()
          resources:
            limits:
              cpu: "100m"
              memory: "128Mi"
            requests:
              cpu: "50m"
              memory: "64Mi"
