name: Destroy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to destroy (dev/prod)'
        required: true
        type: choice
        default: 'dev'
        options:
          - dev
          - prod
      confirm:
        description: 'Type "destroy" to confirm'
        required: true
        type: string

env:
  SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
  SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
  SCW_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Configure AWS credentials for Terraform
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.SCW_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.SCW_SECRET_KEY }}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=fr-par" >> $GITHUB_ENV
          echo "AWS_ENDPOINT_URL_S3=https://s3.fr-par.scw.cloud" >> $GITHUB_ENV

      - name: Terraform Init
        working-directory: ./terraform/environments/${{ github.event.inputs.environment }}
        run: terraform init

      - name: Terraform Destroy
        working-directory: ./terraform/environments/${{ github.event.inputs.environment }}
        run: |
          if [ "${{ github.event.inputs.confirm }}" = "destroy" ]; then
            terraform destroy -auto-approve
          else
            echo "Confirmation not matched. Skipping destroy."
            exit 1
          fi
