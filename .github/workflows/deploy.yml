name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy (dev/prod)'
        required: true
        type: choice
        default: 'dev'
        options:
          - dev
          - prod

env:
  SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
  SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
  SCW_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
  TF_VAR_project_id: ${{ secrets.SCW_PROJECT_ID }}

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    outputs:
      instance_ip: ${{ steps.outputs.outputs.instance_ip }}
      instance_dns: ${{ steps.outputs.outputs.instance_dns }}
    steps:
       - name: Checkout
         uses: actions/checkout@v4

       - name: Setup Terraform
         uses: hashicorp/setup-terraform@v3
         with:
           terraform_version: 1.7.0

       - name: Configure Scaleway credentials for Terraform
         run: |
            echo "SCW_ACCESS_KEY=${{ secrets.SCW_ACCESS_KEY }}" >> $GITHUB_ENV
            echo "SCW_SECRET_KEY=${{ secrets.SCW_SECRET_KEY }}" >> $GITHUB_ENV
            echo "AWS_ACCESS_KEY_ID=${{ secrets.SCW_ACCESS_KEY }}" >> $GITHUB_ENV
            echo "AWS_SECRET_ACCESS_KEY=${{ secrets.SCW_SECRET_KEY }}" >> $GITHUB_ENV
            echo "AWS_REGION=fr-par" >> $GITHUB_ENV
            echo "AWS_ENDPOINT_URL_S3=https://s3.fr-par.scw.cloud" >> $GITHUB_ENV

       - name: Terraform Init
         working-directory: ./terraform/environments/${{ github.event.inputs.environment || 'dev' }}
         run: terraform init

       - name: Terraform Plan
         working-directory: ./terraform/environments/${{ github.event.inputs.environment || 'dev' }}
         run: terraform plan -out=tfplan

       - name: Terraform Apply
         working-directory: ./terraform/environments/${{ github.event.inputs.environment || 'dev' }}
         run: terraform apply -auto-approve tfplan

       - name: Save Outputs
         id: outputs
         working-directory: ./terraform/environments/${{ github.event.inputs.environment || 'dev' }}
         run: |
           echo "instance_ip=$(terraform output -raw instance_ip)" >> $GITHUB_OUTPUT
           echo "instance_dns=$(terraform output -raw instance_dns)" >> $GITHUB_OUTPUT

  deploy-cluster:
    name: Deploy Kubernetes Cluster
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Configure Scaleway credentials for Terraform
        run: |
          echo "SCW_ACCESS_KEY=${{ secrets.SCW_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "SCW_SECRET_KEY=${{ secrets.SCW_SECRET_KEY }}" >> $GITHUB_ENV
          echo "AWS_ACCESS_KEY_ID=${{ secrets.SCW_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.SCW_SECRET_KEY }}" >> $GITHUB_ENV
          echo "AWS_REGION=fr-par" >> $GITHUB_ENV
           echo "AWS_ENDPOINT_URL_S3=https://s3.fr-par.scw.cloud" >> $GITHUB_ENV

      - name: Terraform Init
        working-directory: ./terraform/environments/${{ github.event.inputs.environment || 'dev' }}
        run: terraform init

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -R ${{ needs.terraform.outputs.instance_ip }} || true

      - name: Make deploy script executable
        run: chmod +x deploy-cluster.sh

      - name: Create credentials file
        run: |
           cat > credentials.env << 'EOF'
           export SCW_ACCESS_KEY="${{ secrets.SCW_ACCESS_KEY }}"
           export SCW_SECRET_KEY="${{ secrets.SCW_SECRET_KEY }}"
           export SCW_PROJECT_ID="${{ secrets.SCW_PROJECT_ID }}"
           export SCW_ORGANIZATION_ID="${{ secrets.SCW_ORGANIZATION_ID }}"
           export AWS_ACCESS_KEY_ID="${{ secrets.SCW_ACCESS_KEY }}"
           export AWS_SECRET_ACCESS_KEY="${{ secrets.SCW_SECRET_KEY }}"
           export TFSTATE_BUCKET="tfstate-gpu-mig-presentation"
           export TFSTATE_REGION="fr-par"
           export TFSTATE_ENDPOINT="https://s3.fr-par.scw.cloud"
           export SSH_PRIVATE_KEY_FILE="ssh_key"
           EOF

      - name: Set SSH key permissions
        run: chmod 600 ssh_key

      - name: Create kubeconfig directory
        run: mkdir -p ~/.kube

      - name: Deploy cluster using script
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
        run: |
          source credentials.env
          ./deploy-cluster.sh $ENVIRONMENT

      - name: Display deployment info
        run: |
          echo "🎉 Deployment complete!"
          echo ""
          echo "🔗 Service URLs:"
          echo "   Grafana:     http://${{ needs.terraform.outputs.instance_dns }}/grafana"
          echo "   Prometheus:  http://${{ needs.terraform.outputs.instance_dns }}/prometheus"
          echo "   Direct IP:   http://${{ needs.terraform.outputs.instance_ip }}:30300 (Grafana)"
          echo ""
          echo "🔑 Grafana credentials: admin/admin"
          echo ""
          kubectl get pods -A

  deploy-mig:
    name: Deploy MIG Demo
    needs: [terraform, deploy-cluster]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH and kubectl
        run: |
          mkdir -p ~/.ssh ~/.kube
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -R ${{ needs.terraform.outputs.instance_ip }} || true
          ssh -o StrictHostKeyChecking=no ubuntu@${{ needs.terraform.outputs.instance_ip }} "sudo cat /etc/rancher/k3s/k3s.yaml" > ~/.kube/config
          sed -i 's|127.0.0.1|${{ needs.terraform.outputs.instance_ip }}|g' ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy MIG Config
        run: |
          kubectl apply -f k8s/02-mig-config.yaml
          kubectl apply -f k8s/07-moshi-mig.yaml

      - name: Final Status
        run: |
          kubectl get pods -n moshi-demo
          kubectl get pods -n monitoring
          echo "=== GPU Nodes ==="
          kubectl get nodes -o wide
          echo "=== GPU Devices ==="
          kubectl get nodes -o jsonpath='{.items[*].status.allocatable.nvidia\.com/gpu}'
          echo ""
          echo "=== Service URLs ==="
          echo "Grafana: http://${{ needs.terraform.outputs.instance_dns }}/grafana"
          echo "Prometheus: http://${{ needs.terraform.outputs.instance_dns }}/prometheus"

  deploy-argocd:
    name: Deploy Argo CD
    needs: [terraform, deploy-cluster, deploy-mig]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH and kubectl
        run: |
          mkdir -p ~/.ssh ~/.kube
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -R ${{ needs.terraform.outputs.instance_ip }} || true
          ssh -o StrictHostKeyChecking=no ubuntu@${{ needs.terraform.outputs.instance_ip }} "sudo cat /etc/rancher/k3s/k3s.yaml" > ~/.kube/config
          sed -i 's|127.0.0.1|${{ needs.terraform.outputs.instance_ip }}|g' ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy Argo CD
        run: |
          kubectl apply -f k8s/argocd/00-namespace.yaml
          kubectl apply -f k8s/argocd/01-argocd-install.yaml
          kubectl apply -f k8s/argocd/04-argocd-appproject.yaml
          if [ -f k8s/argocd/03-applications.yaml ]; then
            kubectl apply -f k8s/argocd/03-applications.yaml
          fi

      - name: Wait for Argo CD to be ready
        run: |
          kubectl wait --for=condition=Ready pod -l app.kubernetes.io/name=argocd-server -n argocd --timeout=300s

      - name: Get Argo CD initial admin password
        run: |
          echo "Argo CD admin password:"
          ssh -o StrictHostKeyChecking=no ubuntu@${{ needs.terraform.outputs.instance_ip }} "kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d"

      - name: Display Argo CD status
        run: |
          kubectl get pods -n argocd
          echo ""
          echo "=== Argo CD deployed successfully ==="
          echo "Access via: kubectl port-forward svc/argocd-server -n argocd 8080:443"
