name: Deploy Infrastructure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
  SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
  SCW_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    outputs:
      instance_ip: ${{ steps.outputs.outputs.instance_ip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Configure AWS credentials for Terraform
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.SCW_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.SCW_SECRET_KEY }}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=fr-par" >> $GITHUB_ENV
          echo "AWS_S3_ENDPOINT=https://s3.fr-par.scw.cloud" >> $GITHUB_ENV

      - name: Create S3 bucket if not exists
        run: |
          aws s3 mb s3://gpu-mig-presentation-tfstate --endpoint-url=https://s3.fr-par.scw.cloud 2>/dev/null || echo "Bucket may already exist"

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: ./terraform
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve tfplan

      - name: Save Outputs
        id: outputs
        working-directory: ./terraform
        run: |
          echo "instance_ip=$(terraform output -raw instance_ip)" >> $GITHUB_OUTPUT

  setup-k8s:
    name: Setup Kubernetes
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.K3S_KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Wait for K3s
        run: |
          sleep 60
          kubectl get nodes

      - name: Deploy GPU Operator
        run: |
          kubectl apply -f k8s/00-namespaces.yaml
          kubectl apply -f k8s/01-gpu-operator.yaml

      - name: Deploy Monitoring
        run: |
          kubectl apply -f k8s/03-prometheus.yaml
          kubectl apply -f k8s/04-grafana.yaml

      - name: Deploy Time Slicing Config
        run: |
          kubectl apply -f k8s/02-timeslicing-config.yaml

      - name: Deploy Demo Pods
        run: |
          kubectl apply -f k8s/05-moshi-setup.yaml
          kubectl apply -f k8s/06-moshi-timeslicing.yaml

      - name: Wait for pods
        run: |
          sleep 30
          kubectl get pods -A

  deploy-mig:
    name: Deploy MIG Demo
    needs: setup-k8s
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.K3S_KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy MIG Config
        run: |
          kubectl apply -f k8s/02-mig-config.yaml
          kubectl apply -f k8s/07-moshi-mig.yaml

      - name: Final Status
        run: |
          kubectl get pods -n moshi-demo
          kubectl get pods -n monitoring
          echo "=== GPU Nodes ==="
          kubectl get nodes -o wide
          echo "=== GPU Devices ==="
          kubectl get nodes -o jsonpath='{.items[*].status.allocatable.nvidia\.com/gpu}'
