name: Deploy Infrastructure

on:
  push:
    branches: [dev]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy (dev/prod)'
        required: true
        type: choice
        default: 'dev'
        options:
          - dev
          - prod

env:
  SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
  SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
  SCW_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
  TF_VAR_project_id: ${{ secrets.SCW_PROJECT_ID }}

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    outputs:
      instance_ip: ${{ steps.outputs.outputs.instance_ip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Configure Scaleway credentials for Terraform
        run: |
          echo "SCW_ACCESS_KEY=${{ secrets.SCW_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "SCW_SECRET_KEY=${{ secrets.SCW_SECRET_KEY }}" >> $GITHUB_ENV
          echo "AWS_ACCESS_KEY_ID=${{ secrets.SCW_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.SCW_SECRET_KEY }}" >> $GITHUB_ENV

      - name: Terraform Init
        working-directory: ./terraform/environments/${{ github.event.inputs.environment || 'dev' }}
        run: |
          if [ "${{ github.event.inputs.environment || 'dev' }}" = "prod" ]; then
            terraform init
          else
            terraform init -backend=false
          fi

      - name: Terraform Plan
        working-directory: ./terraform/environments/${{ github.event.inputs.environment || 'dev' }}
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: ./terraform/environments/${{ github.event.inputs.environment || 'dev' }}
        run: terraform apply -auto-approve tfplan

      - name: Save Outputs
        id: outputs
        working-directory: ./terraform/environments/${{ github.event.inputs.environment || 'dev' }}
        run: |
          echo "instance_ip=$(terraform output -raw instance_ip | jq -r '.address')" >> $GITHUB_OUTPUT

  setup-k8s:
    name: Setup Kubernetes
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ needs.terraform.outputs.instance_ip }} >> ~/.ssh/known_hosts

      - name: Wait for K3s to be ready
        run: |
          for i in {1..30}; do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 ubuntu@${{ needs.terraform.outputs.instance_ip }} "sudo k3s kubectl get nodes" &>/dev/null; then
              echo "K3s is ready"
              break
            fi
            echo "Waiting for K3s... attempt $i/30"
            sleep 10
          done
          ssh -o StrictHostKeyChecking=no ubuntu@${{ needs.terraform.outputs.instance_ip }} "sudo k3s kubectl get nodes"

      - name: Get Kubeconfig
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ needs.terraform.outputs.instance_ip }} "sudo cat /etc/rancher/k3s/k3s.yaml" > ~/.kube/config
          sed -i 's|127.0.0.1|${{ needs.terraform.outputs.instance_ip }}|g' ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy GPU Operator
        run: |
          kubectl apply -f k8s/00-namespaces.yaml
          kubectl apply -f k8s/01-gpu-operator.yaml

      - name: Deploy Monitoring
        run: |
          kubectl apply -f k8s/03-prometheus.yaml
          kubectl apply -f k8s/04-grafana.yaml

      - name: Deploy Time Slicing Config
        run: |
          kubectl apply -f k8s/02-timeslicing-config.yaml

      - name: Deploy Demo Pods
        run: |
          kubectl apply -f k8s/05-moshi-setup.yaml
          kubectl apply -f k8s/06-moshi-timeslicing.yaml

      - name: Wait for pods
        run: |
          sleep 30
          kubectl get pods -A

  deploy-mig:
    name: Deploy MIG Demo
    needs: setup-k8s
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh -o StrictHostKeyChecking=no ubuntu@${{ needs.terraform.outputs.instance_ip }} "sudo cat /etc/rancher/k3s/k3s.yaml" > ~/.kube/config
          sed -i 's|127.0.0.1|${{ needs.terraform.outputs.instance_ip }}|g' ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy MIG Config
        run: |
          kubectl apply -f k8s/02-mig-config.yaml
          kubectl apply -f k8s/07-moshi-mig.yaml

      - name: Final Status
        run: |
          kubectl get pods -n moshi-demo
          kubectl get pods -n monitoring
          echo "=== GPU Nodes ==="
          kubectl get nodes -o wide
          echo "=== GPU Devices ==="
          kubectl get nodes -o jsonpath='{.items[*].status.allocatable.nvidia\.com/gpu}'
