name: Validate PR

on:
  pull_request:
    branches: [main]

env:
  SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
  SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
  SCW_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
  TF_VAR_project_id: ${{ secrets.SCW_PROJECT_ID }}

jobs:
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [prod, pre-prod, homelab]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Configure AWS credentials for Terraform
        if: matrix.environment != 'homelab'
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.SCW_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.SCW_SECRET_KEY }}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=fr-par" >> $GITHUB_ENV
          echo "AWS_ENDPOINT_URL_S3=https://s3.fr-par.scw.cloud" >> $GITHUB_ENV

      - name: Terraform Init
        working-directory: ./terraform/environments/${{ matrix.environment }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ./terraform/environments/${{ matrix.environment }}
        run: terraform validate

      - name: Terraform Plan
        if: matrix.environment != 'homelab'
        working-directory: ./terraform/environments/${{ matrix.environment }}
        run: terraform plan -out=tfplan

  yaml-validate:
    name: YAML Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate YAML files
        run: |
          for f in $(find k8s -name "*.yaml"); do
            python3 -c "import yaml; list(yaml.safe_load_all(open('$f')))" || exit 1
          done
