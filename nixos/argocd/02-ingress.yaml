# ArgoCD Ingress Configuration
# Routes traffic from /argocd to ArgoCD server via Traefik

---
# Middleware for stripping the /argocd prefix
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: argocd-strip-prefix
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-strip-prefix
    app.kubernetes.io/part-of: argocd
spec:
  stripPrefix:
    prefixes:
      - /argocd
    forceSlash: false
---
# Middleware for basic auth (optional - use with caution)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: argocd-basic-auth
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-basic-auth
    app.kubernetes.io/part-of: argocd
spec:
  basicAuth:
    secret: argocd-basic-auth
---
# Basic auth secret (base64 encoded username:password)
# Default: admin:admin (b64: YWRtaW46JGFwcjEkLkU5d0xUZ2kkNzdCRXZuSDJiU1Y0cDI0dHdnTDguMA==)
# Generate with: htpasswd -nb admin admin | base64
apiVersion: v1
kind: Secret
metadata:
  name: argocd-basic-auth
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-basic-auth
    app.kubernetes.io/part-of: argocd
type: Opaque
data:
  users: |2
    YWRtaW46JGFwcjEkLkU5d0xUZ2kkNzdCRXZuSDJiU1Y0cDI0dHdnTDguMA==
---
# ArgoCD Ingress - Routes /argocd to ArgoCD server
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-ingress
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-ingress
    app.kubernetes.io/part-of: argocd
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: argocd-argocd-strip-prefix@kubernetescrd,argocd-argocd-basic-auth@kubernetescrd
spec:
  rules:
    - host: montech.montech.mylab
      http:
        paths:
          - path: /argocd
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
---
# Alternative: Traefik IngressRoute (if using CRDs)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-route
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-route
    app.kubernetes.io/part-of: argocd
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`argocd.montech.mylab`)
      kind: Rule
      middlewares:
        - name: argocd-strip-prefix
          namespace: argocd
      services:
        - name: argocd-server
          port: 80
  tls:
    secretName: argocd-tls
