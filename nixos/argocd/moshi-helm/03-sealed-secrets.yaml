---
# SealedSecret for HuggingFace token
# 
# To seal this secret, run:
#   kubectl create secret generic moshi-hf-token \
#     --from-literal=HF_TOKEN=your_token_here \
#     --namespace=moshi \
#     --dry-run=client -o yaml | \
#     kubeseal --scope=namespace-wide --namespace=moshi > sealed-hf-token.yaml
#
# Or using the kubeseal controller:
#   echo -n "your_token_here" | kubeseal \
#     --raw --scope=namespace-wide \
#     --namespace=moshi \
#     --name moshi-hf-token \
#     --from-file=/dev/stdin
#
# Template below - replace with actual sealed secret after sealing

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: moshi-hf-token
  namespace: moshi
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: "false"
    sealedsecrets.bitnami.com/namespace-wide: "true"
spec:
  encryptedData:
    # Replace this with your sealed HF_TOKEN value
    # Example: HF_TOKEN: AgA... (base64 encoded sealed value)
    HF_TOKEN: PLACEHOLDER_REPLACE_WITH_SEALED_VALUE
  template:
    metadata:
      name: moshi-hf-token
      namespace: moshi
      labels:
        app: moshi
    type: Opaque
