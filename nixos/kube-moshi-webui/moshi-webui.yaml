# Moshi WebUI Kubernetes Deployment
# This file deploys Moshi with a web interface

apiVersion: apps/v1
kind: Deployment
metadata:
  name: moshi-webui
  namespace: moshi-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: moshi-webui
  template:
    metadata:
      labels:
        app: moshi-webui
    spec:
      containers:
      - name: moshi-webui
        image: ghcr.io/kyutai-labs/moshi:latest
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "2"
            memory: "4Gi"
          requests:
            cpu: "1"
            memory: "2Gi"
        env:
        - name: MOSHI_WEBUI_ENABLED
          value: "true"
        - name: MOSHI_WEBUI_PORT
          value: "8080"
        volumeMounts:
        - name: moshi-data
          mountPath: /data
      volumes:
      - name: moshi-data
        emptyDir: {}
      nodeSelector:
        kubernetes.io/arch: amd64

---

apiVersion: v1
kind: Service
metadata:
  name: moshi-webui
  namespace: moshi-demo
spec:
  selector:
    app: moshi-webui
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: LoadBalancer

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: moshi-webui
  namespace: moshi-demo
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - http:
      paths:
      - path: /moshi
        pathType: Prefix
        backend:
          service:
            name: moshi-webui
            port:
              number: 80